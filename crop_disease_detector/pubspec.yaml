name: crop_disease_detector
description: A professional crop disease detection app using AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0  # Keep this if you have Flutter 3.22+
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & State Management
  provider: ^6.1.2
  cupertino_icons: ^1.0.8

  # Image Picking
  image_picker: ^1.1.2

  # Machine Learning
  tflite_plus: ^1.0.3
  image: ^4.2.0

  # Navigation
  go_router: ^14.2.7

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Utilities
  intl: ^0.19.0
  share_plus: ^10.0.2
  screenshot: ^3.0.0
  permission_handler: ^11.3.1

  # Backend & Authentication
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  google_sign_in: ^6.2.2

  # User Interface
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # Forms & Validation
  email_validator: ^2.1.17
  phone_numbers_parser: ^9.0.0

  # Notifications
  flutter_local_notifications: ^17.2.3
  firebase_messaging: ^15.1.3
  firebase_core_platform_interface: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/
    - assets/icons/